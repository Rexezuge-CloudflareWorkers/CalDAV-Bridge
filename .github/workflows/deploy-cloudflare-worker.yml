name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: pnpm install

      - name: Dump WRANGLER_JSONC to Repository
        run: |
          if [ ! -f "wrangler.jsonc" ]; then
            echo "${WRANGLER_JSONC}" > wrangler.jsonc
          fi
        env:
          WRANGLER_JSONC: ${{ vars.WRANGLER_JSONC }}

      - name: Initialize Cloudflare Secrets Store
        if: ${{ github.event_name != 'pull_request' }}
        run: npx tsx scripts/init-secrets.ts
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Apply Database Migration
        if: ${{ github.event_name != 'pull_request' }}
        run: yes | npx wrangler d1 migrations apply --remote caldav-bridge-db
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build Web App
        run: pnpm --filter @caldav-bridge/web build

      - name: Typecheck API Worker
        run: pnpm --filter @caldav-bridge/api typecheck

      - name: Dry Run Deploy with Wrangler
        run: pnpm exec wrangler deploy --dry-run
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy with Wrangler
        if: ${{ github.event_name != 'pull_request' }}
        run: pnpm exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
